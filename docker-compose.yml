# StarHubClusterMonitor 编排
# 说明：MySQL 复用你已有的 Docker 容器 mysql8（宿主机端口 3307），
#       因此这里只编排 backend + frontend 两个服务。
# 一键启动：docker compose up -d --build
services:
  backend:
    build: ./backend
    container_name: starhub-backend
    ports:
      - "8080:8080"
    environment:
      # 通过宿主网关访问已有的 MySQL 容器（宿主机 3307 -> 容器 3306）
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: "3307"
      MYSQL_USER: root
      MYSQL_PASSWORD: "123456"
      MYSQL_DB: starhub
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: .
    container_name: starhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
